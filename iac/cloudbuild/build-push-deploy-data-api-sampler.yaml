steps:
  # ============================================================================
  # 1. SETUP & AUTHENTICATION (Kubeconfig für kubectl und Helmfile)
  # ============================================================================
  - id: 'get-gke-credentials'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"
        
        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ['GKE_CLUSTER_NAME', 'GCP_REGION']

  # ============================================================================
  # 2. BUILD & PUSH DOCKER IMAGE
  # ============================================================================
  - id: 'build-push-data-api-sampler'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd sample-services/data-api-sampler
        
        echo "Initializing Docker Buildx for ${_ARCH}..."
        docker buildx create --name builder --use

        echo "Building Data-API Sampler image for linux/${_ARCH} and pushing..."
        docker buildx build \
          --platform linux/${_ARCH} \
          --tag "$${IMAGE_REPO}/data-api-sampler:latest" \
          --push \
          .
    secretEnv: ['IMAGE_REPO']
    waitFor: ['-']

  # ============================================================================
  # 3. GET DATA API IP (Dynamische Ermittlung der IP)
  # ============================================================================
  - id: 'get-data-api-ip'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Waiting for Data API IP..."
        
        for i in {1..15}; do
          DATA_API_IP=$$(kubectl get svc data-api -n base-services -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
          if [[ -n "$$DATA_API_IP" ]]; then
            echo "DATA API IP found: $$DATA_API_IP"
            echo "$$DATA_API_IP" > data_api_ip.txt
            break
          fi
        
          echo "Waiting for IP... ($i/15)"
          sleep 10
        done

        if [[ ! -f "data_api_ip.txt" ]]; then
          echo "::error::Data API IP not found after timeout."
          exit 1
        fi
    waitFor: ['get-gke-credentials']

  # ============================================================================
  # 4. DEPLOY DATA-API SAMPLER (Helmfile)
  # ============================================================================
  - id: 'deploy-data-api-sampler'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ ! -f "data_api_ip.txt" ]]; then
           echo "Error: data_api_ip.txt not found!"
           exit 1
        fi
        
        EXTRACTED_IP=$$(cat data_api_ip.txt)
        export DATA_API_URL="$${EXTRACTED_IP}:8080"
        
        echo "Using DATA_API_URL: $$DATA_API_URL"
        
        export GCP_PROJECT_ID="$PROJECT_ID"
        export GCP_REGION="$$GCP_REGION"
        export IMAGE_REPO="$$IMAGE_REPO"
        
        cd iac/helm/helmfile.d
        
        echo "Running Helmfile ${_HELM_ACTION}..."
        
        if ! helmfile --file data-api-sampler.yaml.gotmpl ${_HELM_ACTION} \
             --state-values-set arch=${_ARCH}; then
            echo "❌ Deployment Failed! Fetching Pod Logs for Debugging..."
            if ! command -v kubectl &> /dev/null; then
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
            fi
            echo "--- POD STATUS ---"
            kubectl get pods -n base-services -l app.kubernetes.io/name=data-api-sampler
            echo "--- LOGS ---"
            kubectl logs -n base-services -l app.kubernetes.io/name=data-api-sampler --tail=50
            exit 1
        fi

    secretEnv: ['GCP_REGION', 'IMAGE_REPO']
    waitFor: ['build-push-data-api-sampler', 'get-data-api-ip']

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _HELM_ACTION: "sync"
  _ARCH: "arm64"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: 'GKE_CLUSTER_NAME'
    - versionName: projects/$PROJECT_ID/secrets/IMAGE_REPO/versions/latest
      env: 'IMAGE_REPO'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
