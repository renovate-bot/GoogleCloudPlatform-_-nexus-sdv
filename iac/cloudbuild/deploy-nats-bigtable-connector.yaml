steps:
  # ============================================================================
  # 1. SETUP & AUTHENTICATION (Kubeconfig for Deployment)
  # ============================================================================
  - id: 'get-gke-credentials'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"
        
        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ['GKE_CLUSTER_NAME', 'GCP_REGION']

  # ============================================================================
  # 2. PREPARE PROTO CONFIGMAP
  # ============================================================================
  - id: 'prepare-proto-configmap'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p iac/helm/nats-bigtable-connector/files
        cp proto/telemetry.proto iac/helm/nats-bigtable-connector/files/
    waitFor: ['get-gke-credentials']

  # ============================================================================
  # 3. DEPLOY NATS-BIGTABLE-CONNECTOR (Helmfile)
  # ============================================================================
  - id: 'deploy-nats-bigtable-connector'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd iac/helm/helmfile.d

        echo "Exporting environment variables for Helmfile..."
        export GCP_PROJECT_ID="$PROJECT_ID"
        export BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT="$$BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT"
        export NATS_URL="nats://connector:$${NATS_CONNECTOR_PASSWORD}@nats:4222"

        echo "Running Helmfile ${_HELM_ACTION}..."

        if ! helmfile --file nats-connector.yaml.gotmpl ${_HELM_ACTION} \
             --state-values-set arch=${_ARCH}; then
            echo "❌ Deployment Failed! Fetching Pod Logs for Debugging..."
            if ! command -v kubectl &> /dev/null; then
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
            fi
            echo "--- POD STATUS ---"
            kubectl get pods -n base-services -l app.kubernetes.io/name=data-api
            echo "--- LOGS ---"
            kubectl logs -n base-services -l app.kubernetes.io/name=data-api --tail=50
            exit 1
        fi

    secretEnv: [ 'GCP_REGION', 'NATS_CONNECTOR_PASSWORD', 'BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT' ]
    waitFor: [ 'get-gke-credentials', 'prepare-proto-configmap' ]

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _HELM_ACTION: "sync"
  _ARCH: "arm64"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: 'GKE_CLUSTER_NAME'
    - versionName: projects/$PROJECT_ID/secrets/BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT/versions/latest
      env: 'BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT'
    - versionName: projects/$PROJECT_ID/secrets/NATS_CONNECTOR_PASSWORD/versions/latest
      env: 'NATS_CONNECTOR_PASSWORD'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
