steps:
  # ============================================================================
  # 0. SETUP & AUTHENTICATION
  # ============================================================================
  - id: 'build-push-nats-auth-callout'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd base-services/auth-callout
        
        VERSION=$$(cat VERSION)
        echo "Building NATS Auth-Callout Version: $$VERSION for ${_ARCH}"

        echo "Initializing Docker Buildx..."
        docker buildx create --name builder --use

        echo "Starting Docker Build for linux/${_ARCH}..."
        docker buildx build \
          --platform linux/${_ARCH} \
          --tag "$${IMAGE_REPO}/nats-auth-callout:$${VERSION}" \
          --push \
          .
    secretEnv: ['IMAGE_REPO', 'GCP_REGION']

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _GCP_REGION: "europe-west4"
  _ARCH: "arm64"
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/IMAGE_REPO/versions/latest
      env: 'IMAGE_REPO'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
