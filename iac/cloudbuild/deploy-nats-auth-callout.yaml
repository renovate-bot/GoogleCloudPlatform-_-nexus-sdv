steps:
  # ============================================================================
  # 1. SETUP & AUTHENTICATION (Kubeconfig for Deployment)
  # ============================================================================
  - id: 'get-gke-credentials'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"
        
        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ['GKE_CLUSTER_NAME', 'GCP_REGION']

  # ============================================================================
  # 2. DEPLOY NATS-AUTH-CALLOUT (Helmfile)
  # ============================================================================
  - id: 'deploy-nats-auth-callout'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd iac/helm/helmfile.d

        echo "Exporting environment variables for Helmfile..."
        export IMAGE_REPO="$$IMAGE_REPO"
        export NATS_AUTH_CALLOUT_PASSWORD="$$NATS_AUTH_CALLOUT_PASSWORD"
        export JWT_ACC_SIGNING_KEY="$$JWT_ACC_SIGNING_KEY"
        export KEYCLOAK_JWK_B64="$$KEYCLOAK_JWK_B64"
        export NATS_CONNECT_URL="nats://auth-callout-service:$${NATS_AUTH_CALLOUT_PASSWORD}@nats:4222"

        echo "Running Helmfile ${_HELM_ACTION}..."

        if ! helmfile --file nats-auth-callout.yaml.gotmpl ${_HELM_ACTION} \
             --state-values-set arch=${_ARCH}; then
            echo "❌ Deployment Failed! Fetching Pod Logs for Debugging..."
            if ! command -v kubectl &> /dev/null; then
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
            fi
            echo "--- POD STATUS ---"
            kubectl get pods -n base-services -l app.kubernetes.io/name=data-api
            echo "--- LOGS ---"
            kubectl logs -n base-services -l app.kubernetes.io/name=data-api --tail=50
            exit 1
        fi

    secretEnv: [ 'GCP_REGION', 'IMAGE_REPO', 'NATS_AUTH_CALLOUT_PASSWORD', 'JWT_ACC_SIGNING_KEY', 'KEYCLOAK_JWK_B64' ]
    waitFor: [ 'get-gke-credentials' ]

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _HELM_ACTION: "sync"
  _ARCH: "arm64"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: 'GKE_CLUSTER_NAME'
    - versionName: projects/$PROJECT_ID/secrets/IMAGE_REPO/versions/latest
      env: 'IMAGE_REPO'
    - versionName: projects/$PROJECT_ID/secrets/NATS_AUTH_CALLOUT_PASSWORD/versions/latest
      env: 'NATS_AUTH_CALLOUT_PASSWORD'
    - versionName: projects/$PROJECT_ID/secrets/JWT_ACC_SIGNING_KEY/versions/latest
      env: 'JWT_ACC_SIGNING_KEY'
    - versionName: projects/$PROJECT_ID/secrets/KEYCLOAK_JWK_B64/versions/latest
      env: 'KEYCLOAK_JWK_B64'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
