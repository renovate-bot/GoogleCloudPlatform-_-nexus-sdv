steps:
  # ============================================================================
  # 1. SETUP & AUTHENTICATION (Kubeconfig für späteres Deployment)
  # ============================================================================
  - id: 'get-gke-credentials'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"
        
        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ['GKE_CLUSTER_NAME', 'GCP_REGION']

  # ============================================================================
  # 2. COMPILE PROTO FILES (Go & Protoc Environment)
  # ============================================================================
  - id: 'compile-proto'
    name: 'golang:1.24'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Installing Protoc..."
        apt-get update && apt-get install -y protobuf-compiler
        
        echo "Installing protoc-gen-go and protoc-gen-go-grpc..."
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        
        export PATH="$$PATH:$$(go env GOPATH)/bin"
        
        echo "Compiling proto files..."
        cd base-services/data-api
        make proto

  # ============================================================================
  # 3. BUILD & PUSH DOCKER IMAGE
  # ============================================================================
  - id: 'build-push-data-api'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd base-services/data-api
        
        echo "Initializing Docker Buildx..."
        docker buildx create --name builder --use

        echo "Starting Docker Build for linux/${_ARCH}..."
        docker buildx build \
          --platform linux/${_ARCH} \
          --tag "$${IMAGE_REPO}/data-api:latest" \
          --push \
          .
    secretEnv: ['IMAGE_REPO']
    waitFor: ['compile-proto']

  # ============================================================================
  # 4. DEPLOY DATA API (Helmfile)
  # ============================================================================
  - id: 'deploy-data-api'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd iac/helm/helmfile.d
        
        echo "Exporting environment variables for Helmfile..."
        export GCP_PROJECT_ID="$PROJECT_ID"
        export GCP_REGION="$$GCP_REGION"
        export IMAGE_REPO="$$IMAGE_REPO"
        export DATA_API_BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT="$$DATA_API_BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT"
        
        echo "Running Helmfile ${_HELM_ACTION}..."
        
        if ! helmfile --file data-api.yaml.gotmpl ${_HELM_ACTION} \
             --state-values-set arch=${_ARCH}; then
            echo "❌ Deployment Failed! Fetching Pod Logs for Debugging..."
            if ! command -v kubectl &> /dev/null; then
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
            fi
            echo "--- POD STATUS ---"
            kubectl get pods -n base-services -l app.kubernetes.io/name=data-api
            echo "--- LOGS ---"
            kubectl logs -n base-services -l app.kubernetes.io/name=data-api --tail=50
            exit 1
        fi

    secretEnv: ['GCP_REGION', 'IMAGE_REPO', 'DATA_API_BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT']
    waitFor: ['build-push-data-api', 'get-gke-credentials']

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _HELM_ACTION: "sync"
  _ARCH: "arm64"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: 'GKE_CLUSTER_NAME'
    - versionName: projects/$PROJECT_ID/secrets/IMAGE_REPO/versions/latest
      env: 'IMAGE_REPO'
    - versionName: projects/$PROJECT_ID/secrets/DATA_API_BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT/versions/latest
      env: 'DATA_API_BIGTABLE_CONNECTOR_GCP_SERVICE_ACCOUNT'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
