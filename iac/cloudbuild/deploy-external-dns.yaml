steps:
  # ============================================================================
  # 0. SETUP & AUTHENTICATION
  # ============================================================================
  - id: "get-gke-credentials"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"

        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ["GKE_CLUSTER_NAME", "GCP_REGION"]

  # ============================================================================
  # 2. Deploy External DNS (remote only)
  # ============================================================================

  # 2a. Deploy
  - id: "external-dns-deploy"
    name: "ghcr.io/helmfile/helmfile:latest"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "$$PKI_STRATEGY" != "remote" ]; then echo "Skipping External DNS Deploy."; exit 0; fi
        # Replace placeholders with actual values using Pipe
          cat iac/helm/external-dns/deployment.yaml | \
          sed "s|__GCP_PROJECT_ID__|${PROJECT_ID}|g" | \
          sed "s|__BASE_DOMAIN__|${_BASE_DOMAIN}|g" | \
          sed "s|__ARCH__|${_ARCH}|g" | \
          kubectl apply -f -
    secretEnv: ["PKI_STRATEGY", "ENVIRONMENT"]
    waitFor: ["get-gke-credentials"]

  # 2b. Wait for External DNS to get ready
  - id: "pki-local-generate-certs"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ "$$PKI_STRATEGY" != "remote" ]; then echo "Skipping External DNS Delay."; exit 0; fi

         echo "Waiting for External DNS deployment..."
          sleep 5

          # Wait for Deployment Availability (Standard K8s way)
          if ! kubectl wait --for=condition=available deployment/external-dns -n external-dns --timeout=180s; then
            echo "::error::External DNS failed to become ready."
            kubectl describe pods -n external-dns
            kubectl logs -n external-dns -l app.kubernetes.io/name=external-dns --tail=50
            exit 1
          fi

          echo "External DNS is ready!"
    secretEnv: ["PKI_STRATEGY", "ENVIRONMENT"]
    waitFor: ["external-dns-deploy"]

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _ENVIRONMENT: "cb-test"
  _PKI_STRATEGY: "local"
  _BASE_DOMAIN: ""
  _ARCH: "arm64"
  _CLUSTER_NAME: "cb-test-gke"
  _REGION: "europe-west4"
  _HELM_ACTION: "sync"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ENV/versions/latest
      env: "ENVIRONMENT"
    - versionName: projects/$PROJECT_ID/secrets/PKI_STRATEGY/versions/latest
      env: "PKI_STRATEGY"
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: "GCP_REGION"
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: "GKE_CLUSTER_NAME"

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: "ALLOW_LOOSE"
