steps:
  # ============================================================================
  # 0. SETUP & AUTHENTICATION
  # ============================================================================
  - id: 'get-gke-credentials'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials "$$GKE_CLUSTER_NAME" \
          --region="$$GCP_REGION" \
          --project="$PROJECT_ID"
        
        echo "Injecting Cloud Build Access Token into Kubeconfig..."
        TOKEN=$$(gcloud auth print-access-token)

        kubectl config set-credentials build-user --token="$${TOKEN}"

        CONTEXT=$$(kubectl config current-context)
        kubectl config set-context "$${CONTEXT}" --user=build-user

        echo "Kubeconfig successfully patched for standalone usage."
    secretEnv: ['GKE_CLUSTER_NAME', 'GCP_REGION']

  # ============================================================================
  # 1. BUILD & PUSH REGISTRATION SERVER (Docker Buildx)
  # ============================================================================
  - id: 'build-push-registration'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Initializing Docker Buildx..."
        docker buildx create --name builder --use
        
        SHA="$${_COMMIT_SHA}"
        
        if [ -z "$$SHA" ] || [ "$$SHA" == "manual" ]; then
           if [ -n "$COMMIT_SHA" ]; then
             SHA="$COMMIT_SHA"
           else
             SHA="manual-latest"
           fi
        fi
        
        echo "$$SHA" > commit_sha.txt
        
        echo "Building for Commit SHA: $$SHA (Platform: linux/${_ARCH})"

        IMAGE_URI="$${IMAGE_REPO}/registration-server"

        TAG_SHA="$${IMAGE_URI}:$${SHA}"
        TAG_LATEST="$${IMAGE_URI}:latest"
        CACHE_TAG="$${IMAGE_URI}:buildcache"

        docker buildx build \
          --platform linux/${_ARCH} \
          --file ./base-services/registration/server/Dockerfile \
          --tag "$$TAG_SHA" \
          --tag "$$TAG_LATEST" \
          --cache-from "type=registry,ref=$$CACHE_TAG" \
          --cache-to "type=inline" \
          --push \
          .
    secretEnv: [ 'IMAGE_REPO' ]

  # ============================================================================
  # 2. DEPLOY EMPTY REGISTRATION SERVER IMAGE (to get IP for local PKI Strategy)
  # ============================================================================
  - id: 'pki-local-initial-deploy'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Initial Deploy."; exit 0; fi
        cd iac/helm/helmfile.d
        export REGISTRATION_SERVER_TLS_CERT="placeholder"
        export REGISTRATION_SERVER_TLS_KEY="placeholder"
        export REGISTRATION_CA_CERT="placeholder"
        export REGISTRATION_CA_KEY="placeholder"
        export REGISTRATION_FACTORY_CA_CERT="placeholder"
        helmfile --file registration.yaml.gotmpl ${_HELM_ACTION} \
            --state-values-set pkiStrategy="local" \
            --state-values-set baseDomain="${_BASE_DOMAIN}" \
            --state-values-set arch=${_ARCH} \
            --state-values-set image.tag=latest
    secretEnv: [ 'PKI_STRATEGY', 'IMAGE_REPO' ]
    waitFor: [ 'build-push-registration' ]

  - id: 'get-external-ips'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Generation."; exit 0; fi

        echo "Waiting for Registration Server LoadBalancer IP..."
        for i in {1..30}; do
           REG_IP=$$(kubectl get svc registration-server -n base-services -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
           if [[ -n "$$REG_IP" ]]; then break; fi
           echo "Waiting for IP... ($$i/30)"
           sleep 10
        done
        
        if [[ -z "$$REG_IP" ]]; then echo "Error: Registration Server IP not found"; exit 1; fi
        echo "Found IP: $$REG_IP"
        
        echo "$$REG_IP" > registration_server_ip.txt
        
        echo "Waiting for Keycloak LoadBalancer IP..."
        for i in {1..30}; do
           KEYCLOAK_IP=$$(kubectl get svc keycloak -n base-services -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
           if [[ -n "$$KEYCLOAK_IP" ]]; then break; fi
           echo "Waiting for IP... ($$i/30)"
           sleep 10
        done
        
        if [[ -z "$$KEYCLOAK_IP" ]]; then echo "Error: Keycloak IP not found"; exit 1; fi
        echo "Found IP: $$KEYCLOAK_IP"
        
        echo "$$KEYCLOAK_IP" > keycloak_ip.txt
        
        echo "Waiting for NATS LoadBalancer IP..."
        for i in {1..30}; do
           NATS_IP=$$(kubectl get svc nats -n base-services -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
           if [[ -n "$$NATS_IP" ]]; then break; fi
           echo "Waiting for IP... ($$i/30)"
           sleep 10
        done
        
        if [[ -z "$$NATS_IP" ]]; then echo "Error: NATS IP not found"; exit 1; fi
        echo "Found IP: $$NATS_IP"
        
        echo "$$NATS_IP" > nats_ip.txt
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'pki-local-initial-deploy' ]

  - id: 'download-ca-certificate-secrets-local'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Generation."; exit 0; fi
        
        echo "Downloading CA certificates and keys from Secret Manager..."
        mkdir -p temp-pki

        # Download Server CA (for signing server certificates)
        gcloud secrets versions access latest --secret="SERVER_CA_CERT" --project="$PROJECT_ID" > temp-pki/server-ca-cert.pem
        gcloud secrets versions access latest --secret="SERVER_CA_KEY" --project="$PROJECT_ID" > temp-pki/server-ca-key.pem

        # Download Registration CA (for reference and upload to container)
        gcloud secrets versions access latest --secret="REGISTRATION_CA_CERT" --project="$PROJECT_ID" > temp-pki/registration-ca-cert.pem
        gcloud secrets versions access latest --secret="REGISTRATION_CA_KEY" --project="$PROJECT_ID" > temp-pki/registration-ca-key.pem

        # Download Factory CA (for reference)
        gcloud secrets versions access latest --secret="REGISTRATION_FACTORY_CA_CERT" --project="$PROJECT_ID" > temp-pki/factory-ca-cert.pem

        # Copy to PKI directory structure (config files from git, certs/keys from Secret Manager)
        mkdir -p base-services/registration/pki/server-ca
        mkdir -p base-services/registration/pki/registration-ca
        mkdir -p base-services/registration/pki/factory-ca

        cp temp-pki/server-ca-cert.pem base-services/registration/pki/server-ca/ca.crt.pem
        cp temp-pki/server-ca-key.pem base-services/registration/pki/server-ca/ca.key.pem
        cp temp-pki/registration-ca-cert.pem base-services/registration/pki/registration-ca/ca.crt.pem
        cp temp-pki/registration-ca-key.pem base-services/registration/pki/registration-ca/ca.key.pem
        cp temp-pki/factory-ca-cert.pem base-services/registration/pki/factory-ca/ca.crt.pem

        echo "✓ CA certificates downloaded and placed in PKI structure"
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'get-external-ips' ]

  - id: 'generate-certificates-local'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Generation."; exit 0; fi
        
        if [ -f "registration_server_ip.txt" ]; then
          REG_IP=$$(cat registration_server_ip.txt)
          echo "Using IP from file: $$REG_IP"
        else
            echo "Error: keycloak_ip.txt not found!"
            exit 1
        fi
        
        PKI_DIR="base-services/registration/pki"
        
        echo "Generating certificate for IP: $$REG_IP"

        # Create registration directory and config file
        mkdir -p $$PKI_DIR/server-ca/registration

        cat > $$PKI_DIR/server-ca/registration/registration.conf <<EOF
        [alt_names]
        subjectAltName = IP:$$REG_IP
        EOF

        # Generate new private key for registration server
        openssl genpkey -algorithm RSA -out $$PKI_DIR/server-ca/registration/registration.key.pem

        # Generate CSR with SAN
        openssl req -new \
          -key $$PKI_DIR/server-ca/registration/registration.key.pem \
          -out $$PKI_DIR/server-ca/registration/registration.csr.pem \
          -subj "/CN=$$REG_IP" \
          -addext "subjectAltName=IP:$$REG_IP"

        # Sign with Server CA (simple signing, not using ca.conf database)
        openssl x509 -req -days 365 \
          -in $$PKI_DIR/server-ca/registration/registration.csr.pem \
          -CA $$PKI_DIR/server-ca/ca.crt.pem \
          -CAkey $$PKI_DIR/server-ca/ca.key.pem \
          -CAcreateserial \
          -out $$PKI_DIR/server-ca/registration/registration.crt.pem \
          -extfile $$PKI_DIR/server-ca/registration/registration.conf \
          -extensions alt_names

        echo "✓ Local certificates generated"
        
        ls -la $$PKI_DIR/server-ca/registration/registration.crt.pem
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'download-ca-certificate-secrets-local' ]

  - id: 'update-cert-config-local'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Generation."; exit 0; fi
        
        echo "Uploading certificates to Secret Manager..."

        # Helper function to create secret if it doesn't exist, then add version
        add_secret_version() {
          local SECRET_NAME=$$1
          local FILE_PATH=$$2
        
          if [ ! -f "$$FILE_PATH" ]; then
             echo "::error::File not found: $$FILE_PATH"
             exit 1
          fi

          if ! gcloud secrets describe "$$SECRET_NAME" --project="$PROJECT_ID" &>/dev/null; then
            echo "Creating secret: $$SECRET_NAME"
            gcloud secrets create "$$SECRET_NAME" \
              --replication-policy="automatic" \
              --project="$PROJECT_ID"
          fi

          echo "Adding version to: $$SECRET_NAME"
          gcloud secrets versions add "$$SECRET_NAME" \
            --data-file="$$FILE_PATH" \
            --project="$PROJECT_ID"
        }

        BASE_DIR="base-services/registration/pki"
        
        add_secret_version "REGISTRATION_SERVER_TLS_CERT" "$$BASE_DIR/server-ca/registration/registration.crt.pem"
        add_secret_version "REGISTRATION_SERVER_TLS_KEY" "$$BASE_DIR/server-ca/registration/registration.key.pem"
        add_secret_version "REGISTRATION_CA_CERT" "$$BASE_DIR/registration-ca/ca.crt.pem"
        add_secret_version "REGISTRATION_CA_KEY" "$$BASE_DIR/registration-ca/ca.key.pem"
        add_secret_version "REGISTRATION_FACTORY_CA_CERT" "$$BASE_DIR/factory-ca/ca.crt.pem"

        echo "✓ Certificates uploaded successfully"
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'generate-certificates-local' ]

  - id: 'download-ca-certificates-remote'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "remote" ]; then echo "Skipping Local PKI Generation."; exit 0; fi
        
        echo "Downloading CA certificates from Google Cloud CAS..."
        mkdir -p temp-certs
        
        # Use configured CA pool names from Secret Manager
        FACTORY_CA_POOL=$$(gcloud secrets versions access latest --secret="FACTORY_CA_POOL" --project="$PROJECT_ID")
        echo "$$FACTORY_CA_POOL" > factory_ca_pool.txt
        
        echo "Using CA pools: Server=$$SERVER_CA_POOL, Factory=$$FACTORY_CA_POOL"

        # Download Factory CA from GCP CAS
        echo "Fetching Factory CA from $$FACTORY_CA_POOL..."
        gcloud privateca roots list \
          --pool="$$FACTORY_CA_POOL" \
          --location="$$GCP_REGION" \
          --format="value(pemCaCertificates)" \
          --limit=1 > temp-certs/factory-ca-pool.crt.pem

        if [ ! -s temp-certs/factory-ca-pool.crt.pem ]; then
           echo "::error::Could not find CA in pool '$$FACTORY_CA_POOL'"
           exit 1
        fi

        echo "Factory CA downloaded successfully."
        echo "Note: Registration CA is managed locally (private key needed for signing) and will be fetched from Secret Manager."
    secretEnv: [ 'PKI_STRATEGY', 'GCP_REGION' ]
    waitFor: [ 'update-cert-config-local' ]


  - id: 'issue-tls-certs-gcp-cas'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "remote" ]; then echo "Skipping Remote PKI Generation."; exit 0; fi
        
        BASE_DOMAIN=$$(gcloud secrets versions access latest --secret="BASE_DOMAIN" --project="$PROJECT_ID" | tr -d '\n')
        echo "$$BASE_DOMAIN" > domain.txt
        
        REGISTRATION_HOSTNAME=$$(gcloud secrets versions access latest --secret="REGISTRATION_HOSTNAME" --project="$PROJECT_ID" | tr -d '\n')
        
        REGION_CLEAN="$$(echo "$$GCP_REGION" | tr -d '\n')"
        
        HOSTNAME="$${REGISTRATION_HOSTNAME}.$${BASE_DOMAIN}"
        CERT_ID="reg-server-$(date +%s)"

        echo "Generating certificate for: $$HOSTNAME in region: $$REGION_CLEAN"
        mkdir -p temp-certs

        openssl genpkey -algorithm RSA -out temp-certs/server.key.pem
        openssl req -new -key temp-certs/server.key.pem \
          -out temp-certs/server.csr.pem \
          -subj "/CN=$$HOSTNAME" \
          -addext "subjectAltName=DNS:$$HOSTNAME"
        
        SERVER_CA_POOL=$$(gcloud secrets versions access latest --secret="SERVER_CA_POOL" --project="$PROJECT_ID" | tr -d '\n')
        echo "$$SERVER_CA_POOL" > server_ca_pool.txt
        
        echo "Requesting signature from GCP CAS using pool: $$SERVER_CA_POOL"
        
        if ! gcloud privateca certificates create "$$CERT_ID" \
          --issuer-pool="$$SERVER_CA_POOL" \
          --issuer-location="$$REGION_CLEAN" \
          --csr="temp-certs/server.csr.pem" \
          --cert-output-file="temp-certs/server.crt.pem" \
          --validity="P30D" \
          --quiet \
          --project="$PROJECT_ID"; then
             echo "::error::Failed to issue certificate"
             exit 1
        fi

        echo "✓ Certificate issued via GCP CAS"
    secretEnv: [ 'PKI_STRATEGY', 'GCP_REGION' ]
    waitFor: [ 'download-ca-certificates-remote' ]

  - id: 'update-gcp-secrets-remote'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "remote" ]; then echo "Skipping Local PKI Generation."; exit 0; fi
        
        echo "Uploading certificates to Secret Manager..."

        # Helper function to create secret if it doesn't exist, then add version
        add_secret_version() {
          local SECRET_NAME=$$1
          local FILE_PATH=$$2

          if ! gcloud secrets describe "$$SECRET_NAME" --project="$PROJECT_ID" &>/dev/null; then
            echo "Creating secret: $$SECRET_NAME"
            gcloud secrets create "$$SECRET_NAME" \
              --replication-policy="automatic" \
              --project="$PROJECT_ID"
          fi

          echo "Adding version to: $$SECRET_NAME"
          gcloud secrets versions add "$$SECRET_NAME" \
            --data-file="$$FILE_PATH" \
            --project="$PROJECT_ID"
        }

        # Server identity certificates
        add_secret_version "REGISTRATION_SERVER_TLS_CERT" "temp-certs/server.crt.pem"
        add_secret_version "REGISTRATION_SERVER_TLS_KEY" "temp-certs/server.key.pem"

        # Factory CA certificate (downloaded from GCP CAS)
        add_secret_version "REGISTRATION_FACTORY_CA_CERT" "temp-certs/factory-ca-pool.crt.pem"

        echo "✓ Certificates uploaded successfully"
        echo "Note: Registration CA cert and key are managed locally by bootstrap script (in Secret Manager)"
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'issue-tls-certs-gcp-cas' ]

  - id: 'fetch-new-secrets-for-deployment'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        REGISTRATION_SERVER_TLS_CERT=$$(gcloud secrets versions access latest --secret="REGISTRATION_SERVER_TLS_CERT" --project="$PROJECT_ID")
        echo "$$REGISTRATION_SERVER_TLS_CERT" > registration_server_tls_crt.txt
        
        REGISTRATION_SERVER_TLS_KEY=$$(gcloud secrets versions access latest --secret="REGISTRATION_SERVER_TLS_KEY" --project="$PROJECT_ID")
        echo "$$REGISTRATION_SERVER_TLS_KEY" > registration_server_tls_key.txt
        
        REGISTRATION_CA_CERT=$$(gcloud secrets versions access latest --secret="REGISTRATION_CA_CERT" --project="$PROJECT_ID")
        echo "$$REGISTRATION_CA_CERT" > registration_server_ca_cert.txt
        
        REGISTRATION_CA_KEY=$$(gcloud secrets versions access latest --secret="REGISTRATION_CA_KEY" --project="$PROJECT_ID")
        echo "$$REGISTRATION_CA_KEY" > registration_server_ca_key.txt
        
        REGISTRATION_FACTORY_CA_CERT=$$(gcloud secrets versions access latest --secret="REGISTRATION_FACTORY_CA_CERT" --project="$PROJECT_ID")
        echo "$$REGISTRATION_FACTORY_CA_CERT" > registration_server_factory_ca_cert.txt
    waitFor: [ 'update-gcp-secrets-remote', 'update-cert-config-local' ]

  - id: 'deploy-registration-server-final'
    name: 'ghcr.io/helmfile/helmfile:latest'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Executing Final Deployment..."
        
        if [[ -f "commit_sha.txt" && -f "registration_server_tls_crt.txt" && -f "registration_server_tls_key.txt" && -f "registration_server_ca_cert.txt" && -f "registration_server_ca_key.txt" && -f "registration_server_factory_ca_cert.txt" ]]; then
             export COMMIT_SHA=$$(cat commit_sha.txt)
             export REGISTRATION_SERVER_TLS_CERT="$(cat registration_server_tls_crt.txt)"
             export REGISTRATION_SERVER_TLS_KEY="$(cat registration_server_tls_key.txt)"
             export REGISTRATION_CA_CERT="$(cat registration_server_ca_cert.txt)"
             export REGISTRATION_CA_KEY="$(cat registration_server_ca_key.txt)"
             export REGISTRATION_FACTORY_CA_CERT="$(cat registration_server_factory_ca_cert.txt)"
        
             echo "Check Cert Format:"
             echo "$$REGISTRATION_SERVER_TLS_CERT" | head -n 1
        else
             echo "::error::Universal .txt files not found."
             ls -la
             exit 1
        fi
        
        EXTRA_ARGS=""
        
        if [ "$$PKI_STRATEGY" == "local" ]; then
             export BASE_DOMAIN=$${_BASE_DOMAIN}
             if [[ -f "keycloak_ip.txt" && -f "nats_ip.txt" ]]; then
                export KEYCLOAK_IP=$$(cat keycloak_ip.txt)
                export NATS_IP=$$(cat nats_ip.txt)
                EXTRA_ARGS="--state-values-set keycloakExternalUrl=https://$${KEYCLOAK_IP}:8443 --state-values-set natsExternalUrl=nats://$${NATS_IP}:4222"
             else
                echo "::error::Local strategy selected but .txt files not found."
                exit 1
             fi
        elif [ "$$PKI_STRATEGY" == "remote" ]; then
             if [ -f "domain.txt" ]; then
                export BASE_DOMAIN=$$(cat domain.txt)
                export KEYCLOAK_IP=""
                export NATS_IP=""
             else
                echo "::error::Remote strategy selected but domain.txt not found."
                exit 1
             fi
        fi
        
        cd iac/helm/helmfile.d
        if ! helmfile --file registration.yaml.gotmpl ${_HELM_ACTION} --wait \
            --args "--timeout 4m0s" \
            --state-values-set pkiStrategy=$$PKI_STRATEGY \
            --state-values-set baseDomain="$$BASE_DOMAIN" \
            --state-values-set arch=${_ARCH} \
            --state-values-set image.tag="$${COMMIT_SHA}" \
            $$EXTRA_ARGS; then
        
            echo "❌ Deployment Failed! Fetching Pod Logs for Debugging..."
        
            if ! command -v kubectl &> /dev/null; then
                curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x kubectl
                mv kubectl /usr/local/bin/
            fi
        
            echo "--- POD STATUS ---"
            kubectl get pods -n base-services -l app.kubernetes.io/name=registration-server
            echo "--- LOGS ---"
            kubectl logs -n base-services -l app.kubernetes.io/name=registration-server --tail=50
        
            exit 1
        fi
    secretEnv: [ 'PKI_STRATEGY', 'IMAGE_REPO' ]
    waitFor: [ 'fetch-new-secrets-for-deployment' ]


  # ============================================================================
  # 7. POST-DEPLOY: RESTART & JWK
  # ============================================================================

  - id: 'restart-registration-server-local'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Local PKI Keycloak Restart."; exit 0; fi

        echo "Restarting Registration Server StatefulSet to pick up new certificates..."

        kubectl rollout restart deployment,statefulset -n base-services -l app.kubernetes.io/name=registration-server

        kubectl rollout status deployment,statefulset -n base-services -l app.kubernetes.io/name=registration-server --timeout=300s
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'deploy-registration-server-final' ]

  - id: 'create-registration-hostname-secret-local'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "$$PKI_STRATEGY" != "local" ]; then echo "Skipping Remote PKI Registration HOSTNAME Secret Creation."; exit 0; fi

        echo "Waiting for Registration Server LoadBalancer IP..."
        for i in {1..30}; do
           REG_IP=$$(kubectl get svc registration-server -n base-services -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
           if [[ -n "$$REG_IP" ]]; then break; fi
           echo "Waiting for IP... ($$i/30)"
           sleep 10
        done
        
        if [[ -z "$$REG_IP" ]]; then echo "Error: Registration Server IP not found"; exit 1; fi
        echo "Found IP: $$REG_IP"
        
        # Create the REGISTRATION_HOSTNAME secret
        if ! gcloud secrets describe "REGISTRATION_HOSTNAME" --project="$PROJECT_ID" &> /dev/null; then
          echo "Create secret 'REGISTRATION_HOSTNAME'..."
          gcloud secrets create "REGISTRATION_HOSTNAME" --replication-policy="automatic" --project="$PROJECT_ID"
        fi
        gcloud secrets versions add REGISTRATION_HOSTNAME --data-file=- --project="$PROJECT_ID" <<< "$$REG_IP"
    secretEnv: [ 'PKI_STRATEGY' ]
    waitFor: [ 'restart-registration-server-local' ]

# ============================================================================
# SUBSTITUTIONS & SECRETS CONFIG
# ============================================================================
substitutions:
  _ENVIRONMENT: "cb-test"
  _PKI_STRATEGY: "local"
  _ARCH: "arm64"
  _BASE_DOMAIN: ""
  _CLUSTER_NAME: "cb-test-gke"
  _REGION: "europe-west4"
  _COMMIT_SHA: "manual"
  _HELM_ACTION: "sync"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/PKI_STRATEGY/versions/latest
      env: 'PKI_STRATEGY'
    - versionName: projects/$PROJECT_ID/secrets/GCP_REGION/versions/latest
      env: 'GCP_REGION'
    - versionName: projects/$PROJECT_ID/secrets/GKE_CLUSTER_NAME/versions/latest
      env: 'GKE_CLUSTER_NAME'
    - versionName: projects/$PROJECT_ID/secrets/IMAGE_REPO/versions/latest
      env: 'IMAGE_REPO'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: 'ALLOW_LOOSE'
